<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Okify — Log in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e18;
    --bg-2: #0b0b14;
    --bg-3: #13131f;
    --purple: #8b5cf6;
    --purple-dim: #7c3aed;
    --purple-bright: #a78bfa;
    --text: #e8e6f0;
    --text-muted: #6b6980;
    --text-dim: #4a4860;
    --border: rgba(255,255,255,0.07);
    --border-purple: rgba(139,92,246,0.2);
    --radius: 10px;
    --radius-lg: 14px;
  }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  nav {
    padding: 1.25rem 2.5rem;
    border-bottom: 1px solid var(--border-purple);
    background: rgba(14,14,24,0.95);
  }

  .logo {
    font-size: 1.3rem; font-weight: 800; letter-spacing: -0.03em;
    color: #fff; text-decoration: none; display: inline-block;
  }
  .logo span { color: var(--purple); }

  .main {
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 2rem;
    background-image: linear-gradient(rgba(139,92,246,0.03) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(139,92,246,0.03) 1px, transparent 1px);
    background-size: 44px 44px;
  }

  .card {
    background: var(--bg-3); border: 1px solid var(--border-purple);
    border-radius: 20px; padding: 2.5rem;
    width: 100%; max-width: 420px;
  }

  .card-title {
    font-size: 1.6rem; font-weight: 800; color: #fff;
    letter-spacing: -0.025em; margin-bottom: 0.35rem;
  }

  .card-sub {
    font-size: 0.85rem; color: var(--text-muted); margin-bottom: 2rem;
    line-height: 1.6;
  }

  .card-sub a { color: var(--purple-bright); text-decoration: none; font-weight: 500; }
  .card-sub a:hover { text-decoration: underline; }

  .form-group { margin-bottom: 1.1rem; }

  label {
    display: block; font-size: 0.78rem; font-weight: 600;
    color: var(--text-muted); margin-bottom: 0.45rem;
    letter-spacing: 0.02em;
  }

  input[type="email"],
  input[type="password"] {
    width: 100%;
    background: var(--bg); border: 1px solid var(--border);
    color: var(--text); padding: 0.78rem 1rem;
    border-radius: var(--radius); font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.9rem; outline: none;
    transition: border-color 0.2s;
  }
  input[type="email"]:focus,
  input[type="password"]:focus { border-color: rgba(139,92,246,0.5); }
  input::placeholder { color: var(--text-dim); }

  .forgot {
    display: block; text-align: right; font-size: 0.75rem;
    color: var(--purple-bright); text-decoration: none; margin-top: 0.4rem;
  }
  .forgot:hover { text-decoration: underline; }

  .btn-submit {
    width: 100%; padding: 0.85rem; border-radius: var(--radius);
    background: var(--purple); color: #fff;
    font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700;
    font-size: 0.92rem; border: none; cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    margin-top: 0.5rem;
  }
  .btn-submit:hover { background: var(--purple-dim); transform: scale(0.99); }
  .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  .divider {
    display: flex; align-items: center; gap: 0.75rem;
    margin: 1.5rem 0;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }
  .divider span { font-size: 0.72rem; color: var(--text-dim); white-space: nowrap; }

  .btn-google {
    width: 100%; padding: 0.82rem; border-radius: var(--radius);
    background: rgba(255,255,255,0.05); color: var(--text);
    font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 600;
    font-size: 0.88rem; border: 1px solid var(--border); cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 0.6rem;
  }
  .btn-google:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.15); }

  .error-msg {
    background: rgba(240,149,149,0.1); border: 1px solid rgba(240,149,149,0.3);
    color: #f09595; padding: 0.75rem 1rem; border-radius: var(--radius);
    font-size: 0.8rem; margin-bottom: 1rem; display: none; line-height: 1.5;
  }

  .success-msg {
    background: rgba(139,92,246,0.1); border: 1px solid rgba(139,92,246,0.3);
    color: var(--purple-bright); padding: 0.75rem 1rem; border-radius: var(--radius);
    font-size: 0.8rem; margin-bottom: 1rem; display: none; line-height: 1.5;
  }

  .signup-prompt {
    text-align: center; margin-top: 1.5rem;
    font-size: 0.82rem; color: var(--text-muted);
  }
  .signup-prompt a { color: var(--purple-bright); text-decoration: none; font-weight: 600; }
  .signup-prompt a:hover { text-decoration: underline; }
</style>
</head>
<body>

<nav>
  <a href="/index.html" class="logo">okify<span>.</span></a>
</nav>

<div class="main">
  <div class="card">
    <h1 class="card-title">Welcome back</h1>
    <p class="card-sub">Don't have an account? <a href="/signup.html">Sign up free</a></p>

    <div class="error-msg" id="error-msg"></div>
    <div class="success-msg" id="success-msg"></div>

    <div class="form-group">
      <label for="email">Email address</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      <a href="/forgot-password.html" class="forgot">Forgot password?</a>
    </div>

    <button class="btn-submit" id="login-btn" onclick="handleLogin()">Log in</button>

    <div class="divider"><span>or continue with</span></div>

    <button class="btn-google" onclick="handleGoogleLogin()">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/>
        <path d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>

    <div class="signup-prompt">
      New to Okify? <a href="/signup.html">Create an account</a>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'YOUR_SUPABASE_URL'
  const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY'
  const { createClient } = supabase
  const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

  function showError(msg) {
    const el = document.getElementById('error-msg')
    el.textContent = msg
    el.style.display = 'block'
    document.getElementById('success-msg').style.display = 'none'
  }

  function showSuccess(msg) {
    const el = document.getElementById('success-msg')
    el.textContent = msg
    el.style.display = 'block'
    document.getElementById('error-msg').style.display = 'none'
  }

  async function handleLogin() {
    const email = document.getElementById('email').value.trim()
    const password = document.getElementById('password').value
    const btn = document.getElementById('login-btn')

    if (!email || !password) {
      showError('Please fill in all fields.')
      return
    }

    btn.disabled = true
    btn.textContent = 'Logging in...'

    const { data, error } = await client.auth.signInWithPassword({ email, password })

    if (error) {
      showError(error.message)
      btn.disabled = false
      btn.textContent = 'Log in'
      return
    }

    showSuccess('Logged in successfully. Redirecting...')
    setTimeout(() => { window.location.href = '/dashboard.html' }, 1000)
  }

  async function handleGoogleLogin() {
    const { error } = await client.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: window.location.origin + '/dashboard.html' }
    })
    if (error) showError(error.message)
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') handleLogin()
  })

  async function checkSession() {
    const { data: { session } } = await client.auth.getSession()
    if (session) window.location.href = '/dashboard.html'
  }
  checkSession()
</script>

</body>
</html>
