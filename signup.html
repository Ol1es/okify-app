<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Okify — Sign up</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e18;
    --bg-2: #0b0b14;
    --bg-3: #13131f;
    --purple: #8b5cf6;
    --purple-dim: #7c3aed;
    --purple-bright: #a78bfa;
    --text: #e8e6f0;
    --text-muted: #6b6980;
    --text-dim: #4a4860;
    --border: rgba(255,255,255,0.07);
    --border-purple: rgba(139,92,246,0.2);
    --radius: 10px;
    --radius-lg: 14px;
  }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  nav {
    padding: 1.25rem 2.5rem;
    border-bottom: 1px solid var(--border-purple);
    background: rgba(14,14,24,0.95);
  }

  .logo {
    font-size: 1.3rem; font-weight: 800; letter-spacing: -0.03em;
    color: #fff; text-decoration: none; display: inline-block;
  }
  .logo span { color: var(--purple); }

  .main {
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 2rem;
    background-image: linear-gradient(rgba(139,92,246,0.03) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(139,92,246,0.03) 1px, transparent 1px);
    background-size: 44px 44px;
  }

  .card {
    background: var(--bg-3); border: 1px solid var(--border-purple);
    border-radius: 20px; padding: 2.5rem;
    width: 100%; max-width: 440px;
  }

  .card-title {
    font-size: 1.6rem; font-weight: 800; color: #fff;
    letter-spacing: -0.025em; margin-bottom: 0.35rem;
  }

  .card-sub {
    font-size: 0.85rem; color: var(--text-muted); margin-bottom: 2rem;
    line-height: 1.6;
  }
  .card-sub a { color: var(--purple-bright); text-decoration: none; font-weight: 500; }
  .card-sub a:hover { text-decoration: underline; }

  .form-group { margin-bottom: 1.1rem; }

  label {
    display: block; font-size: 0.78rem; font-weight: 600;
    color: var(--text-muted); margin-bottom: 0.45rem;
    letter-spacing: 0.02em;
  }

  input[type="email"],
  input[type="password"],
  input[type="text"] {
    width: 100%;
    background: var(--bg); border: 1px solid var(--border);
    color: var(--text); padding: 0.78rem 1rem;
    border-radius: var(--radius); font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.9rem; outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: rgba(139,92,246,0.5); }
  input::placeholder { color: var(--text-dim); }

  .account-type {
    display: grid; grid-template-columns: 1fr 1fr; gap: 0.65rem;
    margin-bottom: 1.1rem;
  }

  .type-option {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 1rem;
    cursor: pointer; text-align: center;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
  }
  .type-option:hover { border-color: var(--border-purple); }
  .type-option.selected {
    border-color: var(--purple);
    background: rgba(139,92,246,0.08);
  }

  .type-option input[type="radio"] {
    position: absolute; opacity: 0; width: 0; height: 0;
  }

  .type-icon { font-size: 1.4rem; margin-bottom: 0.4rem; }
  .type-name { font-size: 0.85rem; font-weight: 700; color: #fff; margin-bottom: 0.2rem; }
  .type-desc { font-size: 0.72rem; color: var(--text-dim); line-height: 1.4; }

  .type-option.selected .type-name { color: var(--purple-bright); }

  .btn-submit {
    width: 100%; padding: 0.85rem; border-radius: var(--radius);
    background: var(--purple); color: #fff;
    font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700;
    font-size: 0.92rem; border: none; cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    margin-top: 0.5rem;
  }
  .btn-submit:hover { background: var(--purple-dim); transform: scale(0.99); }
  .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  .divider {
    display: flex; align-items: center; gap: 0.75rem;
    margin: 1.5rem 0;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }
  .divider span { font-size: 0.72rem; color: var(--text-dim); white-space: nowrap; }

  .btn-google {
    width: 100%; padding: 0.82rem; border-radius: var(--radius);
    background: rgba(255,255,255,0.05); color: var(--text);
    font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 600;
    font-size: 0.88rem; border: 1px solid var(--border); cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 0.6rem;
  }
  .btn-google:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.15); }

  .error-msg {
    background: rgba(240,149,149,0.1); border: 1px solid rgba(240,149,149,0.3);
    color: #f09595; padding: 0.75rem 1rem; border-radius: var(--radius);
    font-size: 0.8rem; margin-bottom: 1rem; display: none; line-height: 1.5;
  }

  .success-msg {
    background: rgba(139,92,246,0.1); border: 1px solid rgba(139,92,246,0.3);
    color: var(--purple-bright); padding: 0.75rem 1rem; border-radius: var(--radius);
    font-size: 0.8rem; margin-bottom: 1rem; display: none; line-height: 1.5;
  }

  .terms {
    font-size: 0.72rem; color: var(--text-dim); text-align: center;
    margin-top: 1rem; line-height: 1.6;
  }
  .terms a { color: var(--purple-bright); text-decoration: none; }

  .login-prompt {
    text-align: center; margin-top: 1.5rem;
    font-size: 0.82rem; color: var(--text-muted);
  }
  .login-prompt a { color: var(--purple-bright); text-decoration: none; font-weight: 600; }
  .login-prompt a:hover { text-decoration: underline; }

  .section-label {
    font-size: 0.72rem; font-weight: 600; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.06em;
    margin-bottom: 0.6rem; display: block;
  }
</style>
</head>
<body>

<nav>
  <a href="/index.html" class="logo">okify<span>.</span></a>
</nav>

<div class="main">
  <div class="card">
    <h1 class="card-title">Create your account</h1>
    <p class="card-sub">Already have an account? <a href="/login.html">Log in</a></p>

    <div class="error-msg" id="error-msg"></div>
    <div class="success-msg" id="success-msg"></div>

    <span class="section-label">I am a...</span>
    <div class="account-type">
      <div class="type-option selected" id="client-option" onclick="selectType('client')">
        <input type="radio" name="account-type" value="client" checked>
        <div class="type-name">Client</div>
        <div class="type-desc">I need videos edited</div>
      </div>
      <div class="type-option" id="editor-option" onclick="selectType('editor')">
        <input type="radio" name="account-type" value="editor">
        <div class="type-name">Editor</div>
        <div class="type-desc">I edit videos for clients</div>
      </div>
    </div>

    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="yourname" autocomplete="username">
    </div>

    <div class="form-group">
      <label for="email">Email address</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="At least 8 characters" autocomplete="new-password">
    </div>

    <button class="btn-submit" id="signup-btn" onclick="handleSignup()">Create account</button>

    <p class="terms">
      By signing up you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
    </p>

    <div class="divider"><span>or continue with</span></div>

    <button class="btn-google" onclick="handleGoogleSignup()">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/>
        <path d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>

    <div class="login-prompt">
      Already have an account? <a href="/login.html">Log in</a>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://lvhwrqvdmbhaxlbjdaod.supabase.co'
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx2aHdycXZkbWJoYXhsYmpkYW9kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyNDk3NTQsImV4cCI6MjA5MzgyNTc1NH0.EqXDoNWiZvPGswzsMwKUo4bXzsn8Kgsog-RPHZf-S1o
'
  const { createClient } = supabase
  const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

  let selectedType = 'client'

  function selectType(type) {
    selectedType = type
    document.getElementById('client-option').classList.toggle('selected', type === 'client')
    document.getElementById('editor-option').classList.toggle('selected', type === 'editor')
  }

  function showError(msg) {
    const el = document.getElementById('error-msg')
    el.textContent = msg
    el.style.display = 'block'
    document.getElementById('success-msg').style.display = 'none'
  }

  function showSuccess(msg) {
    const el = document.getElementById('success-msg')
    el.textContent = msg
    el.style.display = 'block'
    document.getElementById('error-msg').style.display = 'none'
  }

  async function handleSignup() {
    const username = document.getElementById('username').value.trim()
    const email = document.getElementById('email').value.trim()
    const password = document.getElementById('password').value
    const btn = document.getElementById('signup-btn')

    if (!username || !email || !password) {
      showError('Please fill in all fields.')
      return
    }

    if (username.length < 3) {
      showError('Username must be at least 3 characters.')
      return
    }

    if (password.length < 8) {
      showError('Password must be at least 8 characters.')
      return
    }

    btn.disabled = true
    btn.textContent = 'Creating account...'

    const { data, error } = await client.auth.signUp({
      email,
      password,
      options: {
        data: {
          username,
          account_type: selectedType
        }
      }
    })

    if (error) {
      showError(error.message)
      btn.disabled = false
      btn.textContent = 'Create account'
      return
    }

    if (data.user && !data.session) {
      showSuccess('Account created! Check your email to confirm your account before logging in.')
      btn.textContent = 'Check your email'
      return
    }

    showSuccess('Account created successfully. Redirecting...')
    setTimeout(() => { window.location.href = '/dashboard.html' }, 1000)
  }

  async function handleGoogleSignup() {
    const { error } = await client.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: window.location.origin + '/dashboard.html' }
    })
    if (error) showError(error.message)
  }

  async function checkSession() {
    const { data: { session } } = await client.auth.getSession()
    if (session) window.location.href = '/dashboard.html'
  }
  checkSession()
</script>

</body>
</html>
